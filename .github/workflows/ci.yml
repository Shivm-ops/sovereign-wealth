name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Check TypeScript Compilation
      run: npx tsc --noEmit

    - name: Run All Test Cases
      # Runs vitest and outputs maximum details about all test cases being passed
      run: npx vitest run

    - name: Build Application
      run: npm run build
